name: hyprspaces-waybar release

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: hyprspaces-waybar tag or commit to build
        required: true
        default: hyprspaces-waybar-v0.1.6
        type: string
  push:
    tags:
      - "hyprspaces-waybar-v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      ASSET_NAME: hyprspaces-waybar-full-x86_64.tar.zst
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref_name }}

    steps:
      - name: Install checkout dependency
        run: pacman -Syu --noconfirm --needed git

      - name: Check out release tooling
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          path: tooling
          persist-credentials: false

      - name: Check out selected source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          path: source
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            atkmm \
            binutils \
            cairomm \
            catch2 \
            cmake \
            fmt \
            git \
            glib2 \
            glib2-devel \
            glibc \
            gtk-layer-shell \
            gtk3 \
            gtkmm3 \
            jack \
            jsoncpp \
            libdbusmenu-gtk3 \
            libevdev \
            libgcc \
            libinput \
            libmpdclient \
            libnl \
            libpipewire \
            libpulse \
            libsigc++ \
            libstdc++ \
            libwireplumber \
            libxkbcommon \
            meson \
            ninja \
            playerctl \
            scdoc \
            sndio \
            spdlog \
            systemd \
            systemd-libs \
            upower \
            wayland \
            wayland-protocols \
            zstd

      - name: Build and validate release asset
        shell: bash
        run: |
          set -Eeuo pipefail
          source /etc/makepkg.conf
          export CFLAGS CXXFLAGS LDFLAGS
          bash tooling/.github/scripts/build-hyprspaces-waybar-release.sh \
            --source-dir source \
            --source-ref "$SOURCE_REF" \
            --output-dir dist

      - name: Upload CI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hyprspaces-waybar-full-x86_64
          path: dist/${{ env.ASSET_NAME }}
          if-no-files-found: error
          compression-level: 0

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/hyprspaces-waybar-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ASSET_NAME: hyprspaces-waybar-full-x86_64.tar.zst
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download validated asset
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: hyprspaces-waybar-full-x86_64
          path: dist

      - name: Create release and upload asset
        shell: bash
        run: |
          set -Eeuo pipefail

          tag="$GITHUB_REF_NAME"
          asset="dist/$ASSET_NAME"
          [[ "$GITHUB_EVENT_NAME" == "push" ]]
          [[ "$GITHUB_REF" == refs/tags/hyprspaces-waybar-v* ]]
          test -f "$asset"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if gh release view "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq '.assets[].name' | grep -Fqx -- "$ASSET_NAME"; then
              printf 'error: release asset already exists: %s/%s\n' "$tag" "$ASSET_NAME" >&2
              exit 1
            fi
          else
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$tag" \
              --generate-notes
          fi

          gh release upload "$tag" "$asset" --repo "$GITHUB_REPOSITORY"
